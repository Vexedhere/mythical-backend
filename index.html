<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythical AI - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { background: radial-gradient(circle at 10% 10%, #1a1033 0%, #050505 100%); color: white; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; }
        .glass-nav { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(30px); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 28px; transition: all 0.3s ease; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }
        .shake-error { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; border-color: rgba(239, 68, 68, 0.5) !important; }

        .chat-user { background: linear-gradient(135deg, rgba(124, 58, 237, 0.7), rgba(168, 85, 247, 0.7)); border: 1px solid rgba(255, 255, 255, 0.1); }
        .chat-ai { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        
        pre { background: rgba(0, 0, 0, 0.6) !important; border: 1px solid rgba(168, 85, 247, 0.3); padding: 1.5rem; border-radius: 18px; position: relative; margin: 1rem 0; overflow-x: auto;}
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.3); border-radius: 10px; }
        .pfp-container { width: 42px; height: 42px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(168, 85, 247, 0.4); display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="flex flex-col">

<div class="h-10 w-full glass-nav flex items-center px-6 fixed top-0 z-[100] text-[11px] font-mono tracking-wider text-purple-400">
    <i class="fas fa-id-badge mr-2 opacity-70"></i>
    <span id="current-url">ai.mythicalstudios.online/login</span>
</div>

<div id="login-screen" class="fixed inset-0 flex items-center justify-center z-[90] bg-black/95 backdrop-blur-3xl">
    <div id="login-card" class="glass-card p-12 w-[400px] text-center shadow-2xl">
        <div class="w-20 h-20 bg-gradient-to-br from-purple-600 to-indigo-600 rounded-3xl flex items-center justify-center text-4xl mx-auto mb-6">🐉</div>
        <h1 class="text-3xl font-bold mb-2">Mythical AI</h1>
        <p class="text-gray-500 text-[10px] mb-8 uppercase tracking-widest">Neural Registry Login</p>
        <input id="pass" type="password" placeholder="Registry Code" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 focus:border-purple-500 outline-none mb-2 text-center tracking-widest text-lg transition-all">
        <p id="error-text" class="text-red-500 text-[10px] mb-4 font-bold uppercase tracking-widest opacity-0">Neural Link Denied</p>
        <button onclick="authenticate()" class="w-full bg-purple-600 hover:bg-purple-700 py-4 rounded-xl font-bold transition-all active:scale-95 mb-6">Authenticate</button>
    </div>
</div>

<div id="main-app" class="hidden flex h-full pt-10">
    <div class="w-80 glass-nav border-r border-white/5 flex flex-col z-40">
        <div class="p-8">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-11 h-11 bg-purple-600 rounded-xl flex items-center justify-center text-2xl shadow-lg">🐉</div>
                <h1 class="font-bold text-xl tracking-tight">Mythical</h1>
            </div>
            <button onclick="newChat()" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 p-4 rounded-2xl font-bold flex items-center justify-center gap-3 transition-all mb-4"><i class="fas fa-plus-circle text-purple-500"></i> New Session</button>
            <button onclick="showPricing()" class="w-full bg-gradient-to-r from-purple-600/20 to-indigo-600/20 border border-purple-500/30 p-4 rounded-2xl font-bold flex items-center justify-center gap-3 transition-all"><i class="fas fa-crown text-yellow-500"></i> Upgrade Plan</button>
        </div>
        <div id="history" class="flex-1 overflow-y-auto px-5 space-y-3 custom-scroll"></div>
        <div class="p-6 glass-nav border-t border-white/5 mt-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="pfp-container"><i id="pfp-icon" class="fas fa-dragon text-purple-400 text-xl"></i></div>
                <div><p id="display-name" class="font-bold text-sm truncate w-32"></p><p id="display-rank" class="text-[9px] text-purple-500 font-bold uppercase"></p></div>
            </div>
            <button onclick="logout()" class="text-gray-500 hover:text-red-400 p-2"><i class="fas fa-power-off"></i></button>
        </div>
    </div>

    <div id="chat-container" class="flex-1 flex flex-col relative">
        <div id="chat" class="flex-1 overflow-y-auto p-10 space-y-10 custom-scroll pb-40"></div>
        <div class="absolute bottom-0 left-0 w-full p-10 bg-gradient-to-t from-[#050505] to-transparent">
            <div class="max-w-4xl mx-auto glass-card p-2 flex items-center shadow-2xl">
                <input id="input" class="flex-1 bg-transparent py-5 px-8 text-lg outline-none" placeholder="Message or 'generate image'...">
                <button onclick="send()" class="bg-purple-600 hover:bg-purple-500 w-14 h-14 rounded-2xl flex items-center justify-center transition-all shadow-lg active:scale-90"><i class="fas fa-bolt"></i></button>
            </div>
        </div>
    </div>

    <div id="pricing-screen" class="hidden flex-1 flex flex-col items-center justify-center p-10 bg-[#050505]/95 backdrop-blur-3xl z-50 overflow-y-auto">
        <button onclick="hidePricing()" class="absolute top-10 right-10 text-gray-500 hover:text-white text-2xl"><i class="fas fa-times"></i></button>
        <h2 class="text-4xl font-bold mb-2">Neural Tier Selection</h2>
        <p class="text-gray-500 mb-12">Upgrade your computational bandwidth</p>
        <div class="flex gap-8 max-w-5xl">
            <div class="glass-card p-10 border-purple-500/20 w-80 text-center">
                <h3 class="text-xl font-bold mb-4">PLUS</h3>
                <p class="text-5xl font-bold mb-8">₹300<span class="text-sm text-gray-500">/mo</span></p>
                <button onclick="openCart('Plus', 300)" class="w-full bg-purple-600 py-4 rounded-xl font-bold hover:scale-105 transition-transform">Get Plus</button>
            </div>
            <div class="glass-card p-10 border-indigo-500 w-80 text-center relative overflow-hidden">
                <div class="absolute top-0 right-0 bg-indigo-500 text-[10px] px-4 py-1 font-bold">POPULAR</div>
                <h3 class="text-xl font-bold mb-4">PRO</h3>
                <p class="text-5xl font-bold mb-8">₹500<span class="text-sm text-gray-500">/mo</span></p>
                <button onclick="openCart('Pro', 500)" class="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:scale-105 transition-transform">Get Pro</button>
            </div>
        </div>
    </div>
</div>

<div id="cart-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-[200] flex items-center justify-center">
    <div class="glass-card p-8 w-[400px]">
        <h2 class="text-xl font-bold mb-4">Finalize Registry Upgrade</h2>
        <div class="flex justify-between mb-2">
            <span id="cart-item-name" class="text-gray-400">Plan</span>
            <span id="cart-item-price" class="font-bold">₹0</span>
        </div>
        <div class="h-[1px] bg-white/10 my-4"></div>
        <input id="coupon-input" type="text" placeholder="Coupon Code" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl mb-2 outline-none focus:border-purple-500 text-center uppercase tracking-widest">
        <button onclick="applyCoupon()" class="w-full text-[10px] text-purple-400 font-bold mb-6 hover:text-purple-300">VALIDATE COUPON</button>
        <div class="flex justify-between text-2xl font-bold mb-8">
            <span>Total:</span>
            <span id="cart-total" class="text-green-400">₹0</span>
        </div>
        <button id="pay-btn" onclick="initiatePayment()" class="w-full bg-white text-black py-4 rounded-xl font-bold hover:bg-gray-200 active:scale-95 transition-all">Proceed to Payment</button>
        <button onclick="closeCart()" class="w-full mt-4 text-gray-500 text-sm hover:text-white">Cancel Transaction</button>
    </div>
</div>

<script>
    const API = "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";
    let chats = {}, currentChatId = null, currentUser = null;
    let currentCart = { plan: "", originalPrice: 0, finalPrice: 0 };

    const registry = {
        "C@MN26": { name: "U. Chethan", rank: "FOUNDER" },
        "T@MN26": { name: "Thaman Devapuram", rank: "ADMIN" },
        "P@MN26": { name: "Pavan", rank: "MODERATOR" }
    };

    function updateURL(path) { document.getElementById("current-url").textContent = `ai.mythicalstudios.online${path}`; }
    function generateID() { return Math.random().toString(36).substring(2, 15); }

    function authenticate() {
        const code = document.getElementById("pass").value.trim();
        if (registry[code]) {
            currentUser = { name: registry[code].name, rank: registry[code].rank };
            initSession();
        } else {
            document.getElementById("login-card").classList.add("shake-error");
            setTimeout(() => document.getElementById("login-card").classList.remove("shake-error"), 500);
        }
    }

    function initSession() {
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("main-app").classList.remove("hidden");
        document.getElementById("display-name").textContent = currentUser.name;
        document.getElementById("display-rank").textContent = currentUser.rank;
        newChat();
    }

    function showPricing() { document.getElementById("pricing-screen").classList.remove("hidden"); }
    function hidePricing() { document.getElementById("pricing-screen").classList.add("hidden"); }

    function openCart(plan, price) {
        currentCart = { plan, originalPrice: price, finalPrice: price };
        document.getElementById('cart-item-name').innerText = plan + " Tier";
        document.getElementById('cart-item-price').innerText = "₹" + price;
        document.getElementById('cart-total').innerText = "₹" + price;
        document.getElementById('cart-modal').classList.remove('hidden');
    }

    function closeCart() { document.getElementById('cart-modal').classList.add('hidden'); }

    function applyCoupon() {
        const code = document.getElementById('coupon-input').value.trim();
        if (code === "Chetan90") {
            currentCart.finalPrice = currentCart.originalPrice * 0.1;
            document.getElementById('cart-total').innerText = "₹" + currentCart.finalPrice;
            alert("90% Discount Applied by Founder!");
        } else { alert("Invalid Code"); }
    }

    async function initiatePayment() {
        const payBtn = document.getElementById('pay-btn');
        payBtn.disabled = true;
        payBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> SYNCING...';

        try {
            const response = await fetch('http://localhost:3000/api/create-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: currentCart.finalPrice, plan: currentCart.plan })
            });
            const order = await response.json();

            const options = {
                "key": "rzp_test_Sg8ccqB0U7mzIy", 
                "amount": order.amount,
                "name": "Mythical AI",
                "order_id": order.id,
                "handler": async function (res) {
                    const v = await fetch('http://localhost:3000/api/verify-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(res)
                    });
                    const result = await v.json();
                    if(result.success) { alert("Payment Verified. Rank Upgraded!"); location.reload(); }
                }
            };
            new Razorpay(options).open();
        } catch (e) { alert("Backend Offline. Run 'node server.js'"); }
        finally { payBtn.disabled = false; payBtn.innerText = 'Proceed to Payment'; }
    }

    async function send() {
        const input = document.getElementById("input");
        const text = input.value.trim();
        if (!text) return;
        addMsg("user", text);
        input.value = "";

        const aiBox = addMsg("ai", `<i class="fas fa-atom fa-spin text-purple-400"></i> Thinking...`);
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": "Bearer " + API, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "system", content: `User: ${currentUser.name}. Rank: ${currentUser.rank}. Founder: U. Chethan.` }, { role: "user", content: text }]
                })
            });
            const data = await res.json();
            aiBox.innerHTML = marked.parse(data.choices[0].message.content);
        } catch (e) { aiBox.innerHTML = "Neural link failed."; }
    }

    function addMsg(role, content) {
        const div = document.createElement("div");
        div.className = `flex ${role === "user" ? "justify-end" : "justify-start"}`;
        div.innerHTML = `<div class="max-w-[85%] px-8 py-5 rounded-[24px] ${role === 'user' ? 'chat-user' : 'chat-ai'}">${content}</div>`;
        document.getElementById("chat").appendChild(div);
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
        return div.querySelector('.chat-ai');
    }

    function newChat() { document.getElementById("chat").innerHTML = ""; hidePricing(); }
    function logout() { location.reload(); }
</script>
</body>
</html>
