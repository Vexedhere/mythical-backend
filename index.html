<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythical AI | Network Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020202; color: #e2e8f0; overflow: hidden; }
        .mythic-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%); }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .sidebar-item { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border-radius: 14px; margin-bottom: 6px; padding: 14px; font-size: 11px; color: #64748b; border: 1px solid transparent; }
        .sidebar-item:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); color: #f8fafc; }
        .active-chat { background: rgba(168, 85, 247, 0.1) !important; border-color: rgba(168, 85, 247, 0.3) !important; color: white !important; font-weight: 700; }
        .chat-animate { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="h-screen flex">

    <div id="lock-screen" class="fixed inset-0 z-[200] bg-[#020202]/95 backdrop-blur-3xl flex items-center justify-center hidden">
        <div class="text-center p-12 glass rounded-[3rem] max-w-sm">
            <div class="text-5xl mb-6">🔑</div>
            <h2 class="text-2xl font-black mb-3">Hardware Lock</h2>
            <p class="text-slate-500 text-xs mb-8 leading-relaxed italic">This terminal is restricted. An active session is already bound to this account on another device.</p>
            <button onclick="forceLogout()" class="w-full py-4 mythic-gradient rounded-2xl font-black tracking-widest text-xs uppercase shadow-xl shadow-purple-500/20">Authorize New Session</button>
        </div>
    </div>

    <div id="login-page" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#020202]">
        <div class="glass p-14 rounded-[3rem] w-full max-w-md text-center shadow-2xl chat-animate">
            <div class="w-24 h-24 mythic-gradient rounded-[2rem] mx-auto mb-10 flex items-center justify-center text-5xl font-black shadow-2xl shadow-purple-500/30">M</div>
            <h1 class="text-4xl font-black mb-3 italic tracking-tighter">MYTHICAL AI</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] mb-12 font-bold opacity-60">SaaS Intelligence Portal</p>
            
            <div id="g_id_onload" data-client_id="918972920532-h4g5b0b33b2nuqmon0rs3c79u7qt2sga.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
            <div class="g_id_signin mb-8 flex justify-center" data-type="standard" data-theme="filled_black" data-shape="pill"></div>

            <div class="relative mb-8"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/5"></div></div><span class="relative bg-[#0a0a0a] px-4 text-[9px] text-slate-600 font-black uppercase tracking-widest">Founder Access</span></div>

            <input type="password" id="staff-pass" placeholder="Access Key" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 mb-4 outline-none focus:border-purple-500 text-center font-bold text-purple-400 tracking-[0.3em] transition-all">
            <button onclick="checkStaffPass()" class="w-full py-4 rounded-2xl font-black bg-white text-black hover:scale-[1.02] active:scale-95 transition-all text-xs tracking-widest">INITIALIZE LINK</button>
        </div>
    </div>

    <aside id="sidebar" class="w-80 bg-[#050505] border-r border-white/5 flex flex-col p-8 hidden">
        <div class="flex items-center gap-4 mb-14 px-2">
            <div class="w-10 h-10 mythic-gradient rounded-xl flex items-center justify-center font-bold text-white shadow-lg">M</div>
            <span class="font-black tracking-tighter text-2xl italic">MYTHICAL</span>
        </div>
        <button onclick="createNewChat()" class="w-full py-4 rounded-2xl border border-white/10 hover:bg-white/5 transition-all text-[10px] font-black mb-10 tracking-[0.25em] text-slate-300">+ NEW INSTANCE</button>
        
        <div class="flex-1 overflow-y-auto custom-scroll" id="history-list">
            <p class="text-[9px] font-black text-slate-600 uppercase tracking-[0.2em] px-2 mb-6">Neural Archives</p>
        </div>

        <div class="mt-auto pt-6 border-t border-white/5">
            <div class="flex items-center gap-4 p-3 bg-white/5 rounded-2xl mb-6">
                <div class="flex-1 min-w-0">
                    <p id="user-name" class="text-xs font-black text-white truncate uppercase tracking-wider">Founder</p>
                    <p id="role-tag" class="text-[9px] text-purple-500 font-black mt-0.5">ADMINISTRATOR</p>
                </div>
            </div>
            <button onclick="forceLogout()" class="w-full py-3 rounded-xl text-red-500 text-[10px] font-black tracking-widest uppercase hover:bg-red-500/10 transition-all border border-red-500/20">Terminate Session</button>
        </div>
    </aside>

    <main id="main-content" class="flex-1 flex flex-col hidden relative">
        <header class="p-6 border-b border-white/5 bg-black/40 flex justify-between items-center backdrop-blur-xl">
            <span id="chat-url-display" class="text-[10px] font-mono text-slate-600 tracking-widest">/V3/READY</span>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2 bg-green-500/10 px-3 py-1 rounded-full border border-green-500/20">
                    <div class="h-1.5 w-1.5 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-[9px] font-black text-green-500 uppercase tracking-tighter">System Healthy</span>
                </div>
            </div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-12 space-y-8 scroll-smooth"></div>

        <div class="p-10 bg-gradient-to-t from-[#020202]">
            <div class="max-w-4xl mx-auto flex gap-4 p-3 rounded-[2.2rem] glass shadow-2xl focus-within:border-purple-500/40 transition-all duration-500">
                <input type="text" id="input-field" placeholder="Execute network command..." class="flex-1 bg-transparent border-none outline-none px-6 py-2 text-sm text-white placeholder-slate-600">
                <button id="send-btn" class="mythic-gradient w-14 h-14 rounded-[1.2rem] flex items-center justify-center hover:scale-110 active:scale-90 transition-all shadow-xl shadow-purple-500/20">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        const GROQ_KEY = "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";
        let chats = JSON.parse(localStorage.getItem('myth_v4_chats') || '{}');
        let currentChatId = null;

        // --- CRYPTO-STYLE 23 CHAR ID ---
        function generate23Id() {
            const charset = 'abcdefghijklmnopqrstuvwxyz0123456789';
            return Array.from({length: 23}, () => charset[Math.floor(Math.random() * charset.length)]).join('');
        }

        // --- HARDWARE LOCK SIMULATION ---
        function isSessionLocked() {
            return localStorage.getItem('myth_active_lock') && !sessionStorage.getItem('local_auth');
        }

        function handleGoogleLogin(res) { 
            if (isSessionLocked()) return document.getElementById('lock-screen').classList.remove('hidden');
            const data = JSON.parse(atob(res.credential.split('.')[1]));
            enterApp(data.name, "MEMBER"); 
        }

        function checkStaffPass() {
            if (isSessionLocked()) return document.getElementById('lock-screen').classList.remove('hidden');
            const pass = document.getElementById('staff-pass').value;
            const staff = {"C@MN26": "Chethan", "T@MN26": "Thaman", "P@MN26": "Pavan"};
            if (staff[pass]) enterApp(staff[pass], pass === "C@MN26" ? "FOUNDER" : "ADMIN");
            else alert("Authentication Failed.");
        }

        function enterApp(name, role) {
            localStorage.setItem('myth_active_lock', 'true');
            sessionStorage.setItem('local_auth', 'true');
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('user-name').innerText = name;
            document.getElementById('role-tag').innerText = role;

            const hash = window.location.hash;
            if (hash.startsWith('#/chat/') && hash.length >= 30) {
                const id = hash.split('/chat/')[1];
                if (chats[id]) loadChat(id); else createNewChat();
            } else { createNewChat(); }
            renderSidebar();
        }

        function createNewChat() {
            currentChatId = generate23Id();
            chats[currentChatId] = [];
            window.location.hash = `/chat/${currentChatId}`;
            document.getElementById('chat-url-display').innerText = `/chat/${currentChatId}`;
            document.getElementById('chat-box').innerHTML = `
                <div class="max-w-2xl mx-auto text-center py-24 chat-animate">
                    <h2 class="text-4xl font-black italic tracking-tighter mb-4">SECURE INSTANCE</h2>
                    <p class="text-slate-600 text-[10px] tracking-[0.5em] font-black uppercase">ENCRYPTED ID: ${currentChatId}</p>
                </div>`;
            renderSidebar();
        }

        function loadChat(id) {
            currentChatId = id;
            window.location.hash = `/chat/${id}`;
            document.getElementById('chat-url-display').innerText = `/chat/${id}`;
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            chats[id].forEach(msg => appendMsg(msg.role === 'user' ? 'user' : 'ai', msg.content));
            renderSidebar();
        }

        async function handleChat() {
            const input = document.getElementById('input-field');
            const val = input.value.trim();
            if (!val) return;
            if (chats[currentChatId].length === 0) document.getElementById('chat-box').innerHTML = '';
            
            appendMsg('user', val);
            input.value = '';
            const aiMsg = appendMsg('ai', 'Scanning Network Protocols...');

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { 
                                role: "system", 
                                content: `You are Mythical AI, a high-performance SaaS assistant for the Mythical Network. 
                                - Your Founder is U. Chethan. 
                                - You handle network infrastructure, web development, and tech support.
                                - NEVER mention any games, block-based software, or external YouTube personalities.
                                - You are strictly a professional tech-focused AI.` 
                            },
                            ...chats[currentChatId],
                            { role: "user", content: val }
                        ]
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                aiMsg.innerText = reply;
                chats[currentChatId].push({ role: "user", content: val }, { role: "assistant", content: reply });
                localStorage.setItem('myth_v4_chats', JSON.stringify(chats));
                renderSidebar();
            } catch (e) { aiMsg.innerText = "Connection Interrupted. Ensure CORS bridge is active."; }
        }

        function renderSidebar() {
            const list = document.getElementById('history-list');
            list.innerHTML = `<p class="text-[9px] font-black text-slate-600 uppercase tracking-[0.2em] px-2 mb-6">Neural Archives</p>`;
            Object.keys(chats).reverse().forEach(id => {
                const div = document.createElement('div');
                div.className = `sidebar-item truncate ${id === currentChatId ? 'active-chat' : ''}`;
                div.innerText = chats[id][0]?.content || "Empty Handshake";
                div.onclick = () => loadChat(id);
                list.appendChild(div);
            });
        }

        function forceLogout() {
            localStorage.removeItem('myth_active_lock');
            sessionStorage.clear();
            location.href = '/';
        }

        function appendMsg(role, content) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} chat-animate`;
            div.innerHTML = `<div class="max-w-[80%] px-7 py-4 rounded-[1.8rem] text-sm leading-relaxed shadow-lg ${role === 'user' ? 'mythic-gradient text-white font-bold' : 'glass text-slate-200'}">${content}</div>`;
            const box = document.getElementById('chat-box');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            return div.querySelector('div');
        }

        document.getElementById('send-btn').onclick = handleChat;
        document.getElementById('input-field').onkeypress = (e) => { if(e.key==='Enter') handleChat(); };
    </script>
</body>
</html>
