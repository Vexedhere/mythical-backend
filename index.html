<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mythical AI Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body { background:#0a0a0a; color:white; }
.chat-user { background:#7c3aed; }
.chat-ai { background:#1f2937; }
</style>
</head>

<body class="h-screen flex">

<!-- LOGIN -->
<div id="login" class="fixed inset-0 flex items-center justify-center bg-black">
  <div class="bg-[#111] p-8 rounded-2xl w-80 text-center shadow-2xl">
    <h1 class="text-2xl font-bold mb-6">Mythical AI</h1>

    <input id="pass" placeholder="Enter passcode"
      class="w-full p-3 rounded bg-black border border-gray-700 mb-3">

    <button onclick="login()" class="w-full bg-purple-600 p-3 rounded mb-2">
      Login
    </button>

    <button onclick="guestLogin()" class="w-full bg-gray-700 p-3 rounded">
      Continue as Guest
    </button>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="w-64 bg-[#111] p-4 hidden flex-col">
  <button onclick="newChat()" class="bg-purple-600 p-2 rounded mb-4">
    + New Chat
  </button>
  <div id="history"></div>
</div>

<!-- MAIN -->
<div id="main" class="flex-1 flex flex-col hidden">

  <!-- CHAT -->
  <div id="chat" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

  <!-- INPUT -->
  <div class="p-4 flex gap-2 border-t border-gray-800">
    <input id="input" class="flex-1 p-3 rounded bg-[#111] border border-gray-700"
      placeholder="Ask anything...">
    <button onclick="send()" class="bg-purple-600 px-5 rounded">
      Send
    </button>
  </div>

</div>

<script>
const API = "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";

let chats = {};
let current = null;
let user = "guest";

/* LOGIN FIX */
function login(){
  const p = document.getElementById("pass").value;

  const staff = {
    "C@MN26":"Chethan (Founder)",
    "T@MN26":"Admin"
  };

  if(staff[p]){
    user = staff[p];
    startApp();
  } else {
    alert("Invalid pass");
  }
}

function guestLogin(){
  user = "Guest";
  startApp();
}

function startApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("sidebar").classList.remove("hidden");
  document.getElementById("main").classList.remove("hidden");

  chats = JSON.parse(localStorage.getItem("myth_"+user)) || {};

  if(Object.keys(chats).length){
    load(Object.keys(chats)[0]);
  } else {
    newChat();
  }

  renderHistory();
}

/* CHAT */
async function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  addMsg("user", text);
  input.value="";

  const aiBox = addMsg("ai", "Typing...");

  try{
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+API,
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        model:"llama-3.1-8b-instant",
        messages:[
          ...(chats[current]||[]),
          {role:"user",content:text}
        ]
      })
    });

    const data = await res.json();
    const reply = data.choices[0].message.content;

    aiBox.innerHTML = marked.parse(reply);

    chats[current].push(
      {role:"user",content:text},
      {role:"assistant",content:reply}
    );

    save();

  }catch{
    aiBox.innerText="API Error";
  }
}

/* UI */
function addMsg(role,text){
  const div = document.createElement("div");

  div.className = role==="user"?"text-right":"text-left";

  div.innerHTML = `
    <div class="inline-block px-4 py-3 rounded-xl max-w-[70%] ${
      role==="user"?"chat-user":"chat-ai"
    }">${text}</div>
  `;

  document.getElementById("chat").appendChild(div);
  return div.querySelector("div");
}

/* CHAT MGMT */
function newChat(){
  current = Math.random().toString(36).slice(2);
  chats[current]=[];
  document.getElementById("chat").innerHTML="";
  save();
  renderHistory();
}

function load(id){
  current=id;
  document.getElementById("chat").innerHTML="";
  chats[id].forEach(m=>{
    addMsg(m.role==="user"?"user":"ai", m.content);
  });
}

function renderHistory(){
  const h = document.getElementById("history");
  h.innerHTML="";
  Object.keys(chats).forEach(id=>{
    const d=document.createElement("div");
    d.className="p-2 cursor-pointer hover:bg-gray-800 rounded";
    d.innerText="Chat "+id.slice(0,5);
    d.onclick=()=>load(id);
    h.appendChild(d);
  });
}

function save(){
  localStorage.setItem("myth_"+user, JSON.stringify(chats));
}

/* ENTER */
document.getElementById("input").addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
