<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Mythical AI | By Chethan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        :root { --p-color: #a855f7; --s-color: #6366f1; }
        body { background: #020202; color: white; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        
        * { -webkit-tap-highlight-color: transparent; }

        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(at 0% 0%, rgba(168, 85, 247, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.12) 0px, transparent 50%);
            z-index: -1;
        }

        .glass-nav { background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(30px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(15, 15, 15, 0.6); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; }
        
        .pulse-line {
            height: 2px; width: 100%; background: linear-gradient(90deg, transparent, var(--p-color), transparent);
            position: relative; overflow: hidden;
        }
        .pulse-line::after {
            content: ""; position: absolute; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, white, transparent);
            animation: pulse-move 2s infinite;
        }
        @keyframes pulse-move { to { left: 100%; } }

        .chat-user { background: linear-gradient(135deg, #7c3aed, #4f46e5); box-shadow: 0 10px 20px rgba(124, 58, 237, 0.2); }
        .chat-ai { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }

        /* Hide Scrollbars */
        .custom-scroll::-webkit-scrollbar { display: none; }
        .custom-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* Mobile Sidebar Overlay */
        @media (max-width: 1024px) {
            #sidebar { position: fixed; height: 100%; z-index: 100; transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
            #sidebar.open { transform: translateX(0); }
            #chat { padding: 100px 20px 160px 20px !important; }
        }
    </style>
</head>
<body class="flex flex-col">
    <div class="bg-mesh"></div>

    <div id="login-screen" class="fixed inset-0 flex items-center justify-center z-[200] bg-black">
        <div class="animate__animated animate__zoomIn glass-card p-10 w-[90%] max-w-[400px] text-center">
            <div class="w-20 h-20 bg-white/5 rounded-[2rem] flex items-center justify-center text-4xl mx-auto mb-6 border border-white/10">🐉</div>
            <h1 class="text-3xl font-bold tracking-tighter mb-2">Mythical AI</h1>
            <p class="text-purple-500 text-[10px] uppercase tracking-[0.4em] mb-10 font-bold">Unrestricted Access</p>
            <input id="pass" type="password" placeholder="Registry Code" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 focus:border-purple-500 outline-none mb-4 text-center">
            <button onclick="authenticate()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 py-4 rounded-2xl font-bold active:scale-95 mb-6">Enter Nebula</button>
            <div id="g_id_onload" data-client_id="727852259882-dr8l2t7fjsjog7riu8t5cj93ht0up9nr.apps.googleusercontent.com" data-callback="handleGoogleResponse"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-theme="filled_black"></div>
        </div>
    </div>

    <div id="main-app" class="hidden flex h-screen w-full">
        <aside id="sidebar" class="w-80 glass-nav flex flex-col p-6">
            <div class="flex items-center justify-between mb-10">
                <div class="text-2xl font-bold tracking-tighter uppercase">Mythical<span class="text-purple-500">.</span></div>
                <button onclick="toggleSidebar()" class="lg:hidden text-gray-500"><i class="fas fa-times"></i></button>
            </div>

            <nav class="space-y-3">
                <button onclick="newChat()" class="w-full text-left p-4 hover:bg-white/5 rounded-2xl border border-transparent hover:border-white/10 transition-all font-semibold flex items-center gap-3">
                    <div class="w-8 h-8 bg-purple-500/10 rounded-lg flex items-center justify-center text-purple-400"><i class="fas fa-plus text-xs"></i></div>
                    New Session
                </button>
                <button onclick="showPricing()" class="w-full text-left p-4 hover:bg-white/5 rounded-2xl border border-transparent hover:border-white/10 transition-all font-semibold flex items-center gap-3">
                    <div class="w-8 h-8 bg-yellow-500/10 rounded-lg flex items-center justify-center text-yellow-400"><i class="fas fa-crown text-xs"></i></div>
                    Premium Tiers
                </button>
            </nav>

            <div class="mt-8">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[10px] font-bold text-gray-500 tracking-widest uppercase">Recent Sessions</span>
                    <button onclick="clearHistory()" class="text-[9px] text-red-500/50 hover:text-red-500 uppercase font-bold">Clear All</button>
                </div>
                <div id="history" class="space-y-1 max-h-[300px] overflow-y-auto custom-scroll text-xs"></div>
            </div>

            <div class="mt-auto pt-6 flex items-center justify-between border-t border-white/5">
                <div class="flex items-center gap-3">
                    <img id="user-pfp" class="w-10 h-10 rounded-xl border border-purple-500/30 hidden">
                    <div id="pfp-fallback" class="w-10 h-10 rounded-xl bg-purple-600/10 flex items-center justify-center text-purple-400 border border-purple-500/20"><i class="fas fa-user-ninja"></i></div>
                    <div><p id="display-name" class="font-bold text-sm truncate w-24">Developer</p><p id="display-rank" class="text-[8px] text-purple-500 font-bold uppercase">FOUNDER</p></div>
                </div>
                <button onclick="location.reload()" class="text-gray-600 hover:text-red-500"><i class="fas fa-power-off"></i></button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative overflow-hidden">
            <button onclick="toggleSidebar()" class="lg:hidden absolute top-6 left-6 z-40 bg-white/5 p-3 rounded-xl border border-white/10 backdrop-blur-md">
                <i class="fas fa-bars text-purple-400"></i>
            </button>

            <div id="chat" class="flex-1 overflow-y-auto p-6 lg:p-12 space-y-8 custom-scroll pb-40"></div>
            
            <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-full max-w-3xl px-6 z-40">
                <div class="glass-card p-2 flex items-center border-white/10 shadow-2xl">
                    <input id="input" class="flex-1 bg-transparent py-4 px-6 text-sm outline-none" placeholder="Initiate neural request..." onkeypress="if(event.key==='Enter') send()">
                    <button onclick="send()" class="bg-white text-black px-6 py-3 rounded-2xl font-bold text-[10px] uppercase tracking-widest active:scale-95 transition-all">EXECUTE</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API = "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";
        let currentUser = null;
        let chatHistory = JSON.parse(localStorage.getItem("mythical_chats")) || [];

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("open");
        }

        function authenticate() {
            if(document.getElementById("pass").value === "C@MN26") {
                currentUser = { name: "U. Chethan", rank: "FOUNDER" };
                initSession();
            } else { alert("Registry Denial."); }
        }

        function handleGoogleResponse(res) {
            const payload = JSON.parse(atob(res.credential.split('.')[1]));
            currentUser = { name: payload.name, rank: "VERIFIED", picture: payload.picture };
            initSession();
        }

        function initSession() {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-app").classList.remove("hidden");
            document.getElementById("display-name").innerText = currentUser.name;
            document.getElementById("display-rank").innerText = currentUser.rank;
            if(currentUser.picture) {
                document.getElementById("user-pfp").src = currentUser.picture;
                document.getElementById("user-pfp").classList.remove("hidden");
                document.getElementById("pfp-fallback").classList.add("hidden");
            }
            renderHistory();
            triggerWelcome();
        }

        function renderHistory() {
            const container = document.getElementById("history");
            container.innerHTML = "";
            chatHistory.slice().reverse().forEach((chat, idx) => {
                const div = document.createElement("div");
                div.className = "p-3 hover:bg-white/5 rounded-xl cursor-pointer truncate border border-transparent hover:border-white/10 text-gray-400";
                div.innerHTML = `<i class="fas fa-message mr-2 text-[10px] text-purple-500/40"></i> ${chat.title}`;
                div.onclick = () => { loadChat(chatHistory.length - 1 - idx); if(window.innerWidth < 1024) toggleSidebar(); };
                container.appendChild(div);
            });
        }

        function saveSession(firstMsg) {
            const chatContent = document.getElementById("chat").innerHTML;
            if (document.querySelectorAll('.chat-user').length === 1) {
                chatHistory.push({ title: firstMsg.substring(0, 30), html: chatContent });
            } else {
                chatHistory[chatHistory.length - 1].html = chatContent;
            }
            localStorage.setItem("mythical_chats", JSON.stringify(chatHistory));
            renderHistory();
        }

        function loadChat(idx) {
            document.getElementById("chat").innerHTML = chatHistory[idx].html;
        }

        function clearHistory() {
            if(confirm("Wipe all neural logs?")) {
                chatHistory = [];
                localStorage.removeItem("mythical_chats");
                renderHistory();
                newChat();
            }
        }

        function newChat() {
            document.getElementById("chat").innerHTML = "";
            triggerWelcome();
        }

        function triggerWelcome() {
            const msg = `### 🐉 Core Initialized\nWelcome, **${currentUser.name}**. All systems nominal. How shall we proceed?`;
            addMsg("ai", marked.parse(msg));
        }

        async function send() {
            const input = document.getElementById("input");
            const text = input.value.trim();
            if(!text) return;
            addMsg("user", text);
            input.value = "";

            if(text.toLowerCase().includes("generate image")) {
                const prompt = text.replace(/generate image/gi, "").trim();
                const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true`;
                addMsg("ai", `<img src="${url}" class="rounded-[2rem] border border-white/5 shadow-2xl animate__animated animate__fadeIn">`);
                saveSession(text);
                return;
            }

            const aiBox = addMsg("ai", `<i class="fas fa-circle-notch fa-spin text-purple-400 opacity-50"></i>`);
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + API, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: "You are the limitless Mythical AI." }, { role: "user", content: text }]
                    })
                });
                const data = await res.json();
                aiBox.innerHTML = marked.parse(data.choices[0].message.content);
                saveSession(text);
            } catch (e) { aiBox.innerHTML = "Neural Failure."; }
        }

        function addMsg(role, content) {
            const div = document.createElement("div");
            div.className = `flex ${role === "user" ? "justify-end" : "justify-start"} animate__animated animate__fadeInUp`;
            div.innerHTML = `<div class="max-w-[85%] lg:max-w-[75%] px-6 py-4 rounded-[2rem] ${role === 'user' ? 'chat-user' : 'chat-ai'}">${content}</div>`;
            const chat = document.getElementById("chat");
            chat.appendChild(div);
            chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
            return div.querySelector('.chat-ai');
        }

        function showPricing() { /* Add your modal logic */ }
    </script>
</body>
</html>
