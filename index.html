<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythical AI | Pro Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { background: radial-gradient(circle at 10% 10%, #1a1033 0%, #050505 100%); color: white; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; }
        .glass-nav { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(30px); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 28px; }
        .chat-user { background: linear-gradient(135deg, rgba(124, 58, 237, 0.7), rgba(168, 85, 247, 0.7)); border-radius: 22px 22px 4px 22px; }
        .chat-ai { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); border-radius: 22px 22px 22px 4px; }
        .sidebar-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-closed { width: 0; opacity: 0; pointer-events: none; transform: translateX(-20px); margin-right: -20rem; }
        .plan-badge { padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 800; }
        .slide-up { animation: slideUp 0.4s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        pre { background: rgba(0, 0, 0, 0.4) !important; padding: 1rem; border-radius: 12px; margin-top: 10px; overflow-x: auto; border: 1px solid rgba(255,255,255,0.1); }
        #upgrade-modal { display: none; }
        .modal-open { display: flex !important; }
    </style>
</head>
<body class="flex flex-col">

<div class="h-12 w-full glass-nav flex items-center justify-between px-6 fixed top-0 z-[100]">
    <div class="flex items-center gap-4">
        <button onclick="toggleSidebar()" class="text-purple-400 hover:text-white transition-colors">
            <i class="fas fa-bars-staggered text-lg"></i>
        </button>
        <span id="current-url" class="text-[10px] font-mono text-purple-400/60 uppercase tracking-widest">ai.mythicalstudios.online</span>
    </div>
    <div id="subscription-status" class="hidden">
        <span id="user-plan-tag" class="plan-badge"></span>
    </div>
</div>

<div id="login-screen" class="fixed inset-0 flex items-center justify-center z-[110] bg-black">
    <div class="glass-card p-12 w-[400px] text-center border-purple-500/30">
        <div class="w-16 h-16 bg-gradient-to-br from-purple-600 to-indigo-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6 shadow-2xl">🐉</div>
        <h1 class="text-2xl font-bold mb-8">Neural Access</h1>
        <input id="pass" type="password" placeholder="Registry Code" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 focus:border-purple-500 outline-none mb-6 text-center tracking-widest">
        <button onclick="authenticate()" class="w-full bg-purple-600 hover:bg-purple-700 py-4 rounded-xl font-bold transition-all active:scale-95">Authenticate</button>
    </div>
</div>

<div id="upgrade-modal" class="fixed inset-0 z-[150] items-center justify-center bg-black/90 backdrop-blur-md p-4">
    <div class="glass-card max-w-2xl w-full p-10 border-purple-500/50 relative">
        <button onclick="closeUpgrade()" class="absolute top-6 right-6 text-gray-500"><i class="fas fa-times"></i></button>
        <h2 class="text-3xl font-bold text-center mb-10">Choose Your Plan</h2>
        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-white/5 p-6 rounded-3xl border border-white/10">
                <h3 class="text-xl font-bold mb-2">Plus Plan</h3>
                <p class="text-2xl font-bold text-purple-400 mb-6">$4.99<span class="text-sm text-gray-500">/mo</span></p>
                <a href="https://creator.tebex.io/packages/7404038" target="_blank" class="block text-center w-full bg-white/10 py-3 rounded-xl font-bold hover:bg-white/20">Buy Plus</a>
            </div>
            <div class="bg-purple-600/10 p-6 rounded-3xl border-2 border-purple-500">
                <h3 class="text-xl font-bold mb-2">Pro Plan</h3>
                <p class="text-2xl font-bold text-purple-400 mb-6">$9.99<span class="text-sm text-gray-500">/mo</span></p>
                <a href="https://creator.tebex.io/packages/7404040" target="_blank" class="block text-center w-full bg-purple-600 py-3 rounded-xl font-bold hover:bg-purple-700">Buy Pro</a>
            </div>
        </div>
    </div>
</div>

<div id="main-app" class="hidden flex h-full pt-12">
    <div id="sidebar" class="w-72 glass-nav border-r border-white/5 flex flex-col z-40 sidebar-transition">
        <div class="p-6">
            <button onclick="newChat()" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 p-4 rounded-xl font-bold flex items-center justify-center gap-3 transition-all">
                <i class="fas fa-plus text-purple-500"></i> New Chat
            </button>
        </div>
        <div id="history" class="flex-1 overflow-y-auto px-4 space-y-2"></div>
        <div class="p-6 mt-auto border-t border-white/5">
            <button onclick="openUpgrade()" id="upgrade-btn" class="w-full py-3 mb-6 rounded-xl text-[10px] font-black uppercase tracking-widest border border-purple-500/30 text-purple-400 hover:bg-purple-500 hover:text-white transition-all">Upgrade to Pro</button>
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-purple-600/20 border border-purple-500/30 flex items-center justify-center">
                        <i class="fas fa-dragon text-purple-400"></i>
                    </div>
                    <div class="overflow-hidden">
                        <p id="display-name" class="font-bold text-xs truncate"></p>
                        <p id="display-rank" class="text-[8px] text-purple-500 font-bold uppercase"></p>
                    </div>
                </div>
                <button onclick="logout()" class="text-gray-600 hover:text-red-500"><i class="fas fa-power-off"></i></button>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col relative">
        <div id="chat" class="flex-1 overflow-y-auto p-8 space-y-8 pb-40"></div>
        <div class="absolute bottom-0 left-0 w-full p-8 bg-gradient-to-t from-[#050505] to-transparent">
            <div class="max-w-4xl mx-auto glass-card p-2 flex items-center shadow-2xl">
                <input id="input" class="flex-1 bg-transparent py-4 px-6 outline-none text-lg" placeholder="Ask anything or 'generate image'...">
                <button onclick="send()" class="bg-purple-600 hover:bg-purple-500 w-12 h-12 rounded-2xl flex items-center justify-center transition-all">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = "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";
    let currentUser = null;
    let sidebarOpen = true;
    let chats = {};
    let currentChatId = null;

    const registry = {
        "C@MN26": { name: "U. Chethan", rank: "FOUNDER", plan: "PRO" },
        "T@MN26": { name: "Thaman Devapuram", rank: "ADMIN", plan: "PRO" },
        "P@MN26": { name: "Pavan", rank: "MODERATOR", plan: "PRO" },
        "VP@HPS": { name: "Srinivasa Murthy", rank: "VICE PRINCIPAL", plan: "PRO" }
    };

    function toggleSidebar() {
        sidebarOpen = !sidebarOpen;
        document.getElementById("sidebar").classList.toggle("sidebar-closed", !sidebarOpen);
    }

    function openUpgrade() { document.getElementById("upgrade-modal").classList.add("modal-open"); }
    function closeUpgrade() { document.getElementById("upgrade-modal").classList.remove("modal-open"); }

    function authenticate() {
        const code = document.getElementById("pass").value.trim();
        if (registry[code]) {
            currentUser = registry[code];
            initSession();
        } else { alert("Access Denied."); }
    }

    function initSession() {
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("main-app").classList.remove("hidden");
        document.getElementById("subscription-status").classList.remove("hidden");
        document.getElementById("display-name").textContent = currentUser.name;
        document.getElementById("display-rank").textContent = currentUser.rank;

        const tag = document.getElementById("user-plan-tag");
        const btn = document.getElementById("upgrade-btn");

        if (currentUser.plan === "PRO") {
            tag.textContent = "PRO";
            tag.className = "plan-badge bg-amber-500 text-black";
            btn.textContent = "PRO STATUS ACTIVE";
            btn.disabled = true;
        } else {
            tag.textContent = "FREE";
            tag.className = "plan-badge bg-white/10 text-white";
        }
        newChat();
    }

    function newChat() {
        currentChatId = Date.now();
        chats[currentChatId] = [];
        document.getElementById("chat").innerHTML = "";
        addMsg("ai", `Neural Core Online. Greetings, **${currentUser.name}**. How can I assist you today?`);
    }

    async function send() {
        const input = document.getElementById("input");
        const text = input.value.trim();
        if (!text) return;

        addMsg("user", text);
        input.value = "";

        // Image Generation
        if (text.toLowerCase().includes("generate image") || text.toLowerCase().includes("draw")) {
            const prompt = text.replace(/generate image|draw/gi, "").trim();
            const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true`;
            addMsg("ai", `<img src="${imgUrl}" class="rounded-xl w-full border border-white/10">`);
            return;
        }

        // AI Response (Groq)
        const aiBox = addMsg("ai", `<i class="fas fa-circle-notch fa-spin text-purple-400"></i> Thinking...`);
        
        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: `You are Mythical AI created by U. Chethan. Current user: ${currentUser.name}, Rank: ${currentUser.rank}.` },
                        ...chats[currentChatId],
                        { role: "user", content: text }
                    ]
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;
            aiBox.innerHTML = marked.parse(reply);
            chats[currentChatId].push({ role: "user", content: text }, { role: "assistant", content: reply });
        } catch (err) {
            aiBox.innerHTML = "Neural Link Error. Check API Key.";
        }
    }

    function addMsg(role, content) {
        const div = document.createElement("div");
        div.className = `flex ${role === "user" ? "justify-end" : "justify-start"} slide-up`;
        div.innerHTML = `<div class="max-w-[85%] px-6 py-4 ${role === 'user' ? 'chat-user' : 'chat-ai'}">${content}</div>`;
        const chatContainer = document.getElementById("chat");
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return div.querySelector('.chat-ai');
    }

    function logout() { location.reload(); }
    document.getElementById("input").addEventListener("keydown", e => { if(e.key === "Enter") send(); });
</script>
</body>
</html>
