<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mythical AI | Stable Build</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
body { background:#020202; color:#e2e8f0; font-family: sans-serif; }
.glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); }
.active-chat { background: rgba(168,85,247,0.2); }
::-webkit-scrollbar { width:3px; }
</style>
</head>

<body class="h-screen flex">

<!-- LOGIN -->
<div id="login-page" class="fixed inset-0 flex items-center justify-center bg-black">
    <div class="glass p-8 rounded-2xl text-center">
        <h1 class="text-xl font-bold mb-4">Mythical AI</h1>

        <div id="g_id_onload"
            data-client_id="918972920532-h4g5b0b33b2nuqmon0rs3c79u7qt2sga.apps.googleusercontent.com"
            data-callback="handleGoogleLogin">
        </div>
        <div class="g_id_signin mb-4"></div>

        <input id="staff-pass" type="password" placeholder="Passcode"
            class="w-full p-2 rounded bg-black border border-white/10 mb-2">

        <button onclick="checkStaffPass()" class="w-full bg-white text-black p-2 rounded">
            Login
        </button>
    </div>
</div>

<!-- SIDEBAR -->
<aside id="sidebar" class="w-64 p-4 border-r border-white/10 hidden">
    <button onclick="createNewChat()" class="w-full mb-4 bg-purple-600 p-2 rounded">
        + New Chat
    </button>
    <div id="history-list"></div>
</aside>

<!-- MAIN -->
<main id="main" class="flex-1 flex flex-col hidden">
    <div id="chat-box" class="flex-1 p-4 overflow-y-auto"></div>

    <div class="p-4 flex gap-2">
        <input id="input" class="flex-1 p-2 bg-black border border-white/10 rounded">
        <button onclick="handleChat()" class="bg-purple-600 px-4 rounded">Send</button>
    </div>
</main>

<script>
const GROQ_KEY = "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";

let chats = {};
let currentChatId = null;
let currentUser = { key: "guest" };

marked.setOptions({
    highlight: (code) => hljs.highlightAuto(code).value
});

/* LOGIN */
function handleGoogleLogin(res){
    const data = JSON.parse(atob(res.credential.split('.')[1]));
    enterApp(data.email);
}

function checkStaffPass(){
    if(document.getElementById("staff-pass").value === "admin"){
        enterApp("admin");
    } else {
        alert("Wrong pass");
    }
}

function enterApp(key){
    currentUser.key = key;

    chats = JSON.parse(localStorage.getItem("myth_"+key)) || {};

    document.getElementById("login-page").style.display="none";
    document.getElementById("sidebar").classList.remove("hidden");
    document.getElementById("main").classList.remove("hidden");

    if(Object.keys(chats).length){
        loadChat(Object.keys(chats)[0]);
    } else {
        createNewChat();
    }

    renderSidebar();
}

/* CHAT */
async function handleChat(){
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    appendMsg("user", text);
    input.value="";

    const aiDiv = appendMsg("ai", "Thinking...");

    try{
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
            method:"POST",
            headers:{
                "Authorization":"Bearer "+GROQ_KEY,
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                model:"llama-3.1-8b-instant",
                messages:[
                    ...(chats[currentChatId]||[]),
                    {role:"user",content:text}
                ]
            })
        });

        const data = await res.json();
        const reply = data.choices[0].message.content;

        aiDiv.innerHTML = format(reply);

        chats[currentChatId].push(
            {role:"user",content:text},
            {role:"assistant",content:reply}
        );

        save();

    }catch{
        aiDiv.innerText="Error connecting API";
    }
}

/* UI */
function appendMsg(role, text){
    const div = document.createElement("div");

    div.className = "mb-3 " + (role==="user"?"text-right":"text-left");

    div.innerHTML = `
    <div class="inline-block p-3 rounded-lg ${
        role==="user"?"bg-purple-600":"glass"
    }">${text}</div>`;

    document.getElementById("chat-box").appendChild(div);
    return div.querySelector("div");
}

function format(t){
    let html = marked.parse(t);
    return html;
}

/* CHAT MGMT */
function createNewChat(){
    currentChatId = Math.random().toString(36).slice(2);
    chats[currentChatId]=[];
    document.getElementById("chat-box").innerHTML="";
    save();
}

function loadChat(id){
    currentChatId=id;
    const box = document.getElementById("chat-box");
    box.innerHTML="";

    chats[id].forEach(m=>{
        appendMsg(m.role==="user"?"user":"ai", m.content);
    });
}

function renderSidebar(){
    const list = document.getElementById("history-list");
    list.innerHTML="";

    Object.keys(chats).forEach(id=>{
        const div=document.createElement("div");
        div.className="p-2 cursor-pointer hover:bg-white/10";
        div.innerText=id.slice(0,6);
        div.onclick=()=>loadChat(id);
        list.appendChild(div);
    });
}

function save(){
    localStorage.setItem("myth_"+currentUser.key, JSON.stringify(chats));
}

/* ENTER KEY */
document.getElementById("input").addEventListener("keydown",e=>{
    if(e.key==="Enter") handleChat();
});
</script>

</body>
</html>
