<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythical AI | V16.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
        .chat-user { background: linear-gradient(135deg, #7c3aed, #a855f7); box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3); }
        .chat-ai { background: #1f2937; border: 1px solid #374151; }
        .message-bubble { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-chat { background: #312e81; border-left: 4px solid #a855f7; }
        pre { background: #111827; border-radius: 12px; padding: 16px; margin: 12px 0; border: 1px solid #374151; position: relative; }
        .copy-btn { position: absolute; top: 10px; right: 10px; background: #1f2937; color: #9ca3af; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; border: 1px solid #4b5563; cursor: pointer; }
        .url-bar { background: #111827; border-bottom: 1px solid #374151; font-family: monospace; color: #a855f7; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

<div id="login-screen" class="fixed inset-0 flex items-center justify-center bg-black z-50">
    <div class="bg-[#111] p-10 rounded-3xl w-96 text-center border border-purple-500/20 shadow-2xl">
        <div class="w-20 h-20 bg-gradient-to-br from-purple-600 to-violet-600 rounded-2xl flex items-center justify-center text-4xl mx-auto mb-6">🐉</div>
        <h1 class="text-4xl font-bold bg-gradient-to-r from-purple-400 to-violet-400 bg-clip-text text-transparent mb-2">Mythical AI</h1>
        <p class="text-gray-400 mb-8 italic">"Knowledge is the ultimate myth."</p>
        <input id="pass" type="password" placeholder="Enter passcode" class="w-full p-4 rounded-2xl bg-black border border-gray-700 focus:border-purple-500 outline-none mb-4">
        <button onclick="login()" class="w-full bg-purple-600 hover:bg-purple-700 p-4 rounded-2xl font-bold transition-all active:scale-95">Authenticate</button>
        <button onclick="guestLogin()" class="w-full mt-3 text-gray-500 hover:text-white transition-all">Guest Access</button>
    </div>
</div>

<div id="main-app" class="flex h-full w-full hidden flex-col">
    <div class="url-bar h-10 w-full flex items-center px-6 fixed top-0 z-50 text-sm">
        <span id="current-url">ai.mythicalstudios.online/loading...</span>
    </div>

    <div class="flex flex-1 pt-10">
        <div class="w-72 bg-[#0f0f0f] border-r border-gray-800 flex flex-col">
            <div class="p-6 border-b border-gray-800">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center text-2xl">🐉</div>
                    <div>
                        <h1 class="font-bold">Mythical AI</h1>
                        <p class="text-[10px] text-purple-400 tracking-widest uppercase">Registry V16.8</p>
                    </div>
                </div>
            </div>
            <button onclick="newChat()" class="mx-5 mt-6 bg-gradient-to-r from-purple-600 to-violet-600 p-3.5 rounded-xl font-semibold shadow-lg shadow-purple-500/20 active:scale-95 transition-all">
                <i class="fas fa-plus mr-2"></i>New Session
            </button>
            <div id="history" class="flex-1 overflow-y-auto mt-4 px-3 space-y-1 custom-scroll"></div>
            <div class="p-5 border-t border-gray-800 bg-[#0c0c0c]">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-purple-900 rounded-full flex items-center justify-center text-xs border border-purple-500">MC</div>
                    <div class="text-sm">
                        <p id="username" class="font-bold"></p>
                        <p id="user-rank" class="text-[10px] text-purple-500 font-mono uppercase"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col relative">
            <div id="chat" class="flex-1 overflow-y-auto p-8 space-y-8 custom-scroll pb-32"></div>
            
            <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-[#0a0a0a] via-[#0a0a0a] to-transparent">
                <div class="max-w-4xl mx-auto relative">
                    <input id="input" class="w-full bg-[#1a1a1a] border border-gray-700 focus:border-purple-500 rounded-2xl py-5 px-7 pr-16 text-lg outline-none transition-all shadow-2xl" placeholder="Message Mythical AI...">
                    <button onclick="send()" class="absolute right-3 top-1/2 -translate-y-1/2 bg-purple-600 hover:bg-purple-700 w-12 h-12 rounded-xl flex items-center justify-center transition-all">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <p class="text-center text-[10px] text-gray-600 mt-4 uppercase tracking-[0.2em]">Designed & Founded by U. Chethan</p>
            </div>
        </div>
    </div>
</div>

<script>
const API = "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";
let chats = {}, currentChatId = null, currentUser = "Guest", currentRank = "GUEST";

const registry = {
    "C@MN26": { name: "Chethan", rank: "FOUNDER" },
    "T@MN26": { name: "Thaman Devapuram", rank: "ADMIN" },
    "P@MN26": { name: "Pavan", rank: "MODERATOR" }
};

function login() {
    const pass = document.getElementById("pass").value.trim();
    if (registry[pass]) {
        currentUser = registry[pass].name;
        currentRank = registry[pass].rank;
        startApp();
    } else { alert("Access Denied."); }
}

function guestLogin() { currentUser = "Guest"; currentRank = "GUEST"; startApp(); }

function startApp() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("main-app").classList.remove("hidden");
    document.getElementById("username").textContent = currentUser;
    document.getElementById("user-rank").textContent = currentRank;
    chats = JSON.parse(localStorage.getItem("myth_" + currentUser)) || {};
    newChat();
}

function getSystemPrompt() {
    return `You are Mythical AI (V16.8), the core intelligence of Mythical Studios.
    Developed by: U. Chethan. Team: Thaman, Pavan.
    User: ${currentUser} (${currentRank}).
    Style: Professional, elite, concise, and helpful. Always address the user by name.`;
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    addMsg("user", text);
    input.value = "";
    const aiBox = addMsg("ai", `<i class="fas fa-spinner fa-spin mr-2"></i> Synchronizing...`);

    try {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": "Bearer " + API, "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "llama-3.1-70b-versatile",
                messages: [{role: "system", content: getSystemPrompt()}, ...(chats[currentChatId] || []), {role: "user", content: text}],
                temperature: 0.6
            })
        });
        const data = await res.json();
        const reply = data.choices[0].message.content;
        aiBox.innerHTML = marked.parse(reply);
        
        if (!chats[currentChatId]) chats[currentChatId] = [];
        chats[currentChatId].push({role: "user", content: text}, {role: "assistant", content: reply});
        save();
    } catch (e) { aiBox.innerHTML = "Neural link failed."; }
}

function addMsg(role, content) {
    const chatDiv = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = `flex ${role === "user" ? "justify-end" : "justify-start"} message-bubble`;
    div.innerHTML = `<div class="max-w-[85%] px-6 py-4 rounded-2xl ${role === 'user' ? 'chat-user' : 'chat-ai'}">${content}</div>`;
    chatDiv.appendChild(div);
    chatDiv.scrollTop = chatDiv.scrollHeight;
    return div.querySelector('.chat-ai') || div.querySelector('.chat-user');
}

function newChat() {
    currentChatId = Date.now().toString();
    chats[currentChatId] = [];
    document.getElementById("chat").innerHTML = "";
    document.getElementById("current-url").textContent = `ai.mythicalstudios.online/chat/${currentChatId}`;
    renderHistory();
}

function renderHistory() {
    const hist = document.getElementById("history");
    hist.innerHTML = "";
    Object.keys(chats).reverse().forEach(id => {
        const div = document.createElement("div");
        div.className = `p-3 rounded-xl cursor-pointer text-sm mb-1 ${currentChatId === id ? 'active-chat' : 'hover:bg-gray-900'}`;
        div.textContent = chats[id][0]?.content.substring(0, 30) || "Empty Session";
        div.onclick = () => { currentChatId = id; document.getElementById("chat").innerHTML = ""; chats[id].forEach(m => addMsg(m.role === 'user' ? 'user' : 'ai', m.role === 'assistant' ? marked.parse(m.content) : m.content)); renderHistory(); };
        hist.appendChild(div);
    });
}

function save() { localStorage.setItem("myth_" + currentUser, JSON.stringify(chats)); renderHistory(); }

document.getElementById("input").addEventListener("keydown", e => { if(e.key === "Enter") send(); });
</script>
</body>
</html>
