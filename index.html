<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mythical AI Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
    body { 
        background: #0a0a0a; 
        color: white; 
        font-family: 'Inter', system-ui, sans-serif;
    }
    .chat-user { 
        background: linear-gradient(135deg, #7c3aed, #a855f7);
        box-shadow: 0 4px 15px -2px rgba(124, 58, 237, 0.3);
    }
    .chat-ai { 
        background: #1f2937;
        border: 1px solid #374151;
    }
    .message-bubble {
        animation: fadeIn 0.3s ease forwards;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .sidebar-chat:hover {
        background: #1f2937;
    }
    .active-chat {
        background: #312e81;
        border-left: 4px solid #a855f7;
    }

    /* Code Block Styling */
    pre {
        position: relative;
        background: #111827;
        border-radius: 12px;
        padding: 16px;
        margin: 12px 0;
        overflow-x: auto;
        border: 1px solid #374151;
    }
    code {
        font-family: 'Fira Code', monospace;
        font-size: 0.95rem;
    }
    .copy-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        background: #1f2937;
        color: #9ca3af;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid #4b5563;
    }
    .copy-btn:hover {
        background: #374151;
        color: white;
    }
    .copy-btn.copied {
        background: #10b981;
        color: white;
        border-color: #10b981;
    }
</style>
</head>
<body class="h-screen flex overflow-hidden">

<!-- LOGIN SCREEN -->
<div id="login" class="fixed inset-0 flex items-center justify-center bg-black z-50">
  <div class="bg-[#111] p-10 rounded-3xl w-96 text-center shadow-2xl border border-purple-500/20">
    <div class="flex justify-center mb-6">
      <div class="w-20 h-20 bg-gradient-to-br from-purple-600 to-violet-600 rounded-2xl flex items-center justify-center text-4xl shadow-lg">
        🐉
      </div>
    </div>
    <h1 class="text-4xl font-bold bg-gradient-to-r from-purple-400 to-violet-400 bg-clip-text text-transparent mb-2">
      Mythical AI
    </h1>
    <p class="text-gray-400 mb-8">Neural Registry • V16.8</p>
    
    <input id="pass" placeholder="Enter passcode" 
      class="w-full p-4 rounded-2xl bg-black border border-gray-700 focus:border-purple-500 outline-none text-lg mb-4">
    
    <button onclick="login()" 
      class="w-full bg-gradient-to-r from-purple-600 to-violet-600 hover:from-purple-700 hover:to-violet-700 p-4 rounded-2xl font-semibold text-lg transition-all active:scale-95">
      Authenticate
    </button>
    
    <button onclick="guestLogin()" 
      class="w-full mt-3 text-gray-400 hover:text-white p-4 rounded-2xl font-medium transition-all">
      Continue as Guest
    </button>
  </div>
</div>

<!-- MAIN APP -->
<div class="flex h-full w-full hidden" id="app">

  <!-- SIDEBAR -->
  <div id="sidebar" class="w-72 bg-[#0f0f0f] border-r border-gray-800 flex flex-col">
    <div class="p-5 border-b border-gray-800">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-gradient-to-br from-purple-600 to-violet-600 rounded-xl flex items-center justify-center text-2xl">
          🐉
        </div>
        <div>
          <h1 class="text-2xl font-bold tracking-tight">Mythical AI</h1>
          <p class="text-xs text-purple-400 font-medium">Neural Registry • V16.8</p>
        </div>
      </div>
    </div>

    <button onclick="newChat()" 
      class="mx-5 mt-6 mb-4 flex items-center justify-center gap-3 bg-gradient-to-r from-purple-600 to-violet-600 hover:from-purple-700 hover:to-violet-700 py-3.5 rounded-2xl font-semibold transition-all active:scale-95 shadow-lg shadow-purple-500/30">
      <i class="fas fa-plus"></i>
      New Conversation
    </button>

    <div class="px-5 text-xs font-medium text-gray-500 mb-2 mt-4">HISTORY</div>
    <div id="history" class="flex-1 overflow-y-auto px-3 space-y-1 custom-scroll"></div>

    <div class="p-5 border-t border-gray-800 mt-auto">
      <div class="flex items-center gap-3 text-sm">
        <div class="w-8 h-8 bg-purple-600 rounded-full flex items-center justify-center text-lg">
          🐉
        </div>
        <div>
          <p id="username" class="font-medium"></p>
          <p id="user-rank" class="text-xs text-purple-400"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="flex-1 flex flex-col">
    <div class="h-16 border-b border-gray-800 flex items-center px-6 justify-between bg-[#0a0a0a]">
      <div class="flex items-center gap-3">
        <div class="text-xl">🐉</div>
        <div>
          <div id="chat-title" class="font-semibold text-lg">Mythical AI</div>
          <div class="text-xs text-purple-400">Designed & Founded by U. Chethan • V16.8</div>
        </div>
      </div>
    </div>

    <div id="chat" class="flex-1 overflow-y-auto p-8 space-y-8 custom-scroll bg-[#0a0a0a]"></div>

    <div class="p-6 border-t border-gray-800 bg-[#0a0a0a]">
      <div class="max-w-4xl mx-auto">
        <div class="relative">
          <input id="input" 
            class="w-full bg-[#1a1a1a] border border-gray-700 focus:border-purple-500 rounded-3xl py-5 px-7 pr-16 text-lg outline-none transition-all"
            placeholder="Ask Mythical AI anything...">
          
          <button onclick="send()" 
            class="absolute right-3 top-1/2 -translate-y-1/2 bg-purple-600 hover:bg-purple-700 w-11 h-11 rounded-2xl flex items-center justify-center transition-all active:scale-90">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
        <p class="text-center text-xs text-gray-500 mt-4">Mythical AI • Designed & Founded by U. Chethan</p>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== CONFIG ====================
const API = "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";

let chats = {};
let current = null;
let user = "Guest";
let userRank = "GUEST";

const registry = {
    "C@MN26": { name: "Chethan", rank: "FOUNDER" },
    "T@MN26": { name: "Thaman Devapuram", rank: "ADMIN" },
    "P@MN26": { name: "Pavan", rank: "MODERATOR" },
    "P@HPSK": { name: "Amit Singh", rank: "PRINCIPAL" },
    "VP@HPS": { name: "Srinivasa Murthy", rank: "VICE PRINCIPAL" },
    "Z@HPSK": { name: "Zakaria", rank: "TEACHER" },
    "V@HPSK": { name: "Vijayalakshmi", rank: "TEACHER" },
    "R@HPSK": { name: "Rajesh", rank: "TEACHER" }
};

// ==================== LOGIN ====================
function login(){
  const pass = document.getElementById("pass").value.trim();
  if(registry[pass]){
    user = registry[pass].name;
    userRank = registry[pass].rank;
    startApp();
  } else {
    alert("Invalid passcode. Access denied.");
  }
}

function guestLogin(){
  user = "Guest";
  userRank = "GUEST";
  startApp();
}

function startApp(){
  document.getElementById("login").style.display = "none";
  document.getElementById("app").classList.remove("hidden");
  
  document.getElementById("username").textContent = user;
  document.getElementById("user-rank").textContent = userRank;
  
  chats = JSON.parse(localStorage.getItem("myth_"+user)) || {};
  
  if(Object.keys(chats).length > 0){
    load(Object.keys(chats)[0]);
  } else {
    newChat();
  }
  renderHistory();
}

// ==================== SYSTEM PROMPT ====================
function getSystemPrompt() {
  return `You are Mythical AI, Designed and Founded by U. Chethan.
Your friends are Thaman and Pavan.

When responding:
- Always start important responses with "I am Mythical AI, Designed and Founded by U. Chethan."
- If asked about friends, say "My friends are Thaman and Pavan."
- When giving code, always use proper markdown code blocks with language specified (python, html, javascript, css, etc.).
- Be helpful, wise, and slightly mysterious.`;
}

// ==================== COPY CODE FUNCTION ====================
function addCopyButtons() {
  document.querySelectorAll('pre').forEach(pre => {
    // Remove existing copy button if any
    if (pre.querySelector('.copy-btn')) return;

    const btn = document.createElement('button');
    btn.className = 'copy-btn flex items-center gap-1 text-xs';
    btn.innerHTML = `<i class="fas fa-copy"></i> Copy`;
    
    btn.onclick = () => {
      const code = pre.querySelector('code').textContent;
      navigator.clipboard.writeText(code).then(() => {
        btn.innerHTML = `<i class="fas fa-check"></i> Copied!`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = `<i class="fas fa-copy"></i> Copy`;
          btn.classList.remove('copied');
        }, 2000);
      });
    };

    pre.style.position = 'relative';
    pre.appendChild(btn);
  });
}

// ==================== CHAT FUNCTIONS ====================
async function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  addMsg("user", text);
  input.value = "";

  const aiBox = addMsg("ai", `<div class="flex items-center gap-2"><i class="fas fa-spinner fa-spin"></i> Thinking in the neural realm...</div>`);

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: [
          { role: "system", content: getSystemPrompt() },
          ...(chats[current] || []),
          { role: "user", content: text }
        ],
        temperature: 0.85,
        max_tokens: 2048
      })
    });

    const data = await res.json();
    let reply = data.choices[0].message.content;

    aiBox.innerHTML = marked.parse(reply);
    
    // Add copy buttons to any new code blocks
    setTimeout(addCopyButtons, 100);

    chats[current].push(
      {role: "user", content: text},
      {role: "assistant", content: reply}
    );
    save();
  } catch(e) {
    aiBox.innerHTML = `<span class="text-red-400">⚠️ The neural connection was disrupted. Please try again.</span>`;
  }
}

function addMsg(role, content){
  const chatDiv = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = `flex ${role === "user" ? "justify-end" : "justify-start"} message-bubble`;

  div.innerHTML = `
    <div class="max-w-[80%]">
      <div class="inline-block px-6 py-4 rounded-3xl ${
        role === "user" 
          ? "chat-user text-white rounded-br-none" 
          : "chat-ai rounded-bl-none"
      }">${content}</div>
    </div>
  `;

  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;

  // If it's AI message, add copy buttons after render
  if (role === "ai") {
    setTimeout(addCopyButtons, 150);
  }

  return div.querySelector("div.inline-block");
}

// ==================== CHAT MANAGEMENT ====================
function newChat(){
  current = "chat_" + Date.now();
  chats[current] = [];
  document.getElementById("chat").innerHTML = "";
  document.getElementById("chat-title").innerHTML = `Mythical AI <span class="text-purple-400 text-sm">(V16.8)</span>`;
  save();
  renderHistory();
}

function load(id){
  current = id;
  document.getElementById("chat").innerHTML = "";
  
  chats[id].forEach(m => {
    if(m.role === "assistant"){
      addMsg("ai", marked.parse(m.content));
    } else {
      addMsg("user", m.content);
    }
  });

  document.getElementById("chat-title").innerHTML = `Mythical AI <span class="text-purple-400 text-sm">(V16.8)</span>`;
}

function renderHistory(){
  const container = document.getElementById("history");
  container.innerHTML = "";

  Object.keys(chats).reverse().forEach(id => {
    const firstUserMsg = chats[id].find(m => m.role === "user")?.content || "New Conversation";
    const preview = firstUserMsg.length > 45 ? firstUserMsg.substring(0, 45) + "..." : firstUserMsg;

    const div = document.createElement("div");
    div.className = `sidebar-chat p-4 rounded-2xl cursor-pointer transition-all text-sm ${current === id ? 'active-chat' : ''}`;
    div.innerHTML = `
      <div class="font-medium text-gray-200 line-clamp-1">${preview}</div>
      <div class="text-xs text-gray-500 mt-1">${new Date(parseInt(id.split('_')[1])).toLocaleDateString('en-IN')}</div>
    `;
    div.onclick = () => load(id);
    container.appendChild(div);
  });
}

function save(){
  localStorage.setItem("myth_" + user, JSON.stringify(chats));
  renderHistory();
}

// Enter key support
document.getElementById("input").addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});
</script>

<style>
.custom-scroll::-webkit-scrollbar {
  width: 6px;
}
.custom-scroll::-webkit-scrollbar-thumb {
  background: #4b5563;
  border-radius: 20px;
}
.line-clamp-1 {
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
</style>

</body>
</html>
