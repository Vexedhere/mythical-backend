<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f2f2f2;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .coffee-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .coffee-list li {
            margin-bottom: 20px;
        }
        .coffee-list li a {
            text-decoration: none;
            color: #337ab7;
        }
        .coffee-list li a:hover {
            color: #23527c;
        }
        .coffee-details {
            padding: 20px;
        }
        .coffee-details h1 {
            margin-top: 0;
        }
        .order-form {
            padding: 20px;
        }
        .order-form label {
            display: block;
            margin-bottom: 10px;
        }
        .order-form input[type="text"], .order-form input[type="number"] {
            width: 100%;
            height: 40px;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .order-form input[type="submit"] {
            width: 100%;
            height: 40px;
            padding: 10px;
            background-color: #337ab7;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .order-form input[type="submit"]:hover {
            background-color: #23527c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Coffee Shop</h1>
        <ul class="coffee-list">
            {% for coffee in coffees %}
                <li>
                    <a href="{{ url_for('coffee', coffee_id=coffee.id) }}">{{ coffee.name }}</a>
                </li>
            {% endfor %}
        </ul>
        <div class="coffee-details">
            {% if coffee %}
                <h1>{{ coffee.name }}</h1>
                <p>Price: {{ coffee.price }}</p>
                <p>Description: {{ coffee.description }}</p>
                <form action="{{ url_for('order') }}" method="post">
                    <input type="hidden" name="coffee_id" value="{{ coffee.id }}">
                    <label for="customer_name">Customer Name:</label>
                    <input type="text" id="customer_name" name="customer_name"><br><br>
                    <label for="quantity">Quantity:</label>
                    <input type="number" id="quantity" name="quantity"><br><br>
                    <input type="submit" value="Order">
                </form>
            {% endif %}
        </div>
    </div>
</body>
</html>
