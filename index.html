<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mythical AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#020202; color:white; font-family:system-ui; }
.glass { background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); }
</style>
</head>

<body class="h-screen flex">

<!-- LOGIN -->
<div id="login" class="m-auto glass p-10 rounded-3xl w-[350px] text-center">
    <h1 class="text-2xl font-bold mb-6">MYTHICAL AI</h1>

    <input id="pass" placeholder="Access Key"
    class="w-full p-3 mb-4 rounded-xl bg-black border border-white/10 text-center">

    <button onclick="login()"
    class="w-full p-3 bg-white text-black rounded-xl font-bold">
    LOGIN
    </button>
</div>

<!-- APP -->
<div id="app" class="hidden flex flex-col w-full">

    <div id="chat" class="flex-1 p-6 overflow-y-auto space-y-4"></div>

    <div class="p-4 flex gap-2">
        <input id="input" placeholder="Type message..."
        class="flex-1 p-3 rounded-xl bg-black border border-white/10">

        <button onclick="send()"
        class="px-6 bg-purple-600 rounded-xl">Send</button>
    </div>

</div>

<script>
const API = "http://localhost:5000";

let token = sessionStorage.getItem("auth_token");
let messages = [];

if(token){
    document.getElementById("login").style.display="none";
    document.getElementById("app").classList.remove("hidden");
}

/* ================= LOGIN ================= */
async function login(){
    const pass = document.getElementById("pass").value;

    const res = await fetch(API + "/api/auth", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ passcode: pass })
    });

    const data = await res.json();

    if(data.success){
        token = data.token;
        sessionStorage.setItem("auth_token", token);

        document.getElementById("login").style.display="none";
        document.getElementById("app").classList.remove("hidden");
    } else {
        alert("Login failed");
    }
}

/* ================= CHAT ================= */
async function send(){
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    addMsg("user", text);
    input.value = "";

    const aiDiv = addMsg("ai", "Thinking...");

    messages.push({ role:"user", content:text });

    try{
        const res = await fetch(API + "/api/chat", {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + token
            },
            body:JSON.stringify({ messages })
        });

        const data = await res.json();

        if(data.error){
            aiDiv.innerText = data.error;
            return;
        }

        const reply = data.choices[0].message.content;
        aiDiv.innerText = reply;

        messages.push({ role:"assistant", content:reply });

    }catch(e){
        aiDiv.innerText = "Server not reachable";
    }
}

/* ================= UI ================= */
function addMsg(role, text){
    const div = document.createElement("div");

    div.className = "p-3 rounded-xl max-w-[70%] " +
        (role==="user" ? "bg-purple-600 ml-auto" : "glass");

    div.innerText = text;

    document.getElementById("chat").appendChild(div);
    return div;
}
</script>

</body>
</html>
